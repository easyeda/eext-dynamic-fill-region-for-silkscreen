<!doctype html>
<html lang="zh-Hans">
<head>
  <title>动态丝印填充</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 12px 16px;
      margin: 0;
      font-size: 14px;
      color: #333;
      user-select: none;
    }
    .row {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label { min-width: 40px; }
    input[type="number"] {
      width: 80px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .options {
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    .options-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
    .opt-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .opt-item input[type="checkbox"] {
      margin: 0;
    }
    .btn {
      padding: 10px 0;
      width: 100%;
      cursor: pointer;
      border: 1px solid #1890ff;
      border-radius: 4px;
      background: #1890ff;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 2px;
    }
    .btn:hover { background: #40a9ff; }
    .btn:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
    .btn.finish {
      background: #52c41a;
      border-color: #52c41a;
    }
    .btn.finish:hover { background: #73d13d; }
  </style>
</head>
<body>
  <div class="row">
    <label>间隙:</label>
    <input type="number" id="gap" value="10" min="0" max="1000" />
    <span>mil</span>
  </div>
  <div class="row">
    <label>层:</label>
    <label><input type="radio" name="layer" id="layerTop" value="3" checked /> 顶层丝印</label>
    <label><input type="radio" name="layer" id="layerBottom" value="4" /> 底层丝印</label>
  </div>
  <div class="options">
    <div class="options-title">避让对象:</div>
    <div class="options-grid">
      <label class="opt-item"><input type="checkbox" id="optSelectAll" /> 全选</label>
      <label class="opt-item"><input type="checkbox" id="optVias" checked /> 过孔</label>
      <label class="opt-item"><input type="checkbox" id="optPads" checked /> 游离焊盘</label>
      <label class="opt-item"><input type="checkbox" id="optCutouts" checked /> 挖槽区域</label>
      <label class="opt-item"><input type="checkbox" id="optTextSilk" checked /> 丝印层文本</label>
      <label class="opt-item"><input type="checkbox" id="optLinesSilk" checked /> 丝印层线条</label>
      <label class="opt-item"><input type="checkbox" id="optTextCopper" /> 铜层文本</label>
      <label class="opt-item"><input type="checkbox" id="optLinesCopper" /> 铜层线条</label>
      <label class="opt-item"><input type="checkbox" id="optTracksCopper" /> 铜层导线</label>
    </div>
  </div>
  <div class="row">
    <button id="btnToggle" class="btn">开始绘制</button>
  </div>

  <script>
    var drawing = false;
    var btn = document.getElementById('btnToggle');
    var gapInput = document.getElementById('gap');
    var layerTop = document.getElementById('layerTop');
    var layerBottom = document.getElementById('layerBottom');

    var optSelectAll = document.getElementById('optSelectAll');
    var optVias = document.getElementById('optVias');
    var optPads = document.getElementById('optPads');
    var optCutouts = document.getElementById('optCutouts');
    var optTextCopper = document.getElementById('optTextCopper');
    var optTextSilk = document.getElementById('optTextSilk');
    var optLinesSilk = document.getElementById('optLinesSilk');
    var optLinesCopper = document.getElementById('optLinesCopper');
    var optTracksCopper = document.getElementById('optTracksCopper');

    optSelectAll.addEventListener('change', function() {
      var checked = optSelectAll.checked;
      optVias.checked = checked;
      optPads.checked = checked;
      optCutouts.checked = checked;
      optTextSilk.checked = checked;
      optLinesSilk.checked = checked;
      optTextCopper.checked = checked;
      optLinesCopper.checked = checked;
      optTracksCopper.checked = checked;
    });

    function startDrawing() {
      var gap = parseFloat(gapInput.value) || 0;
      if (gap < 0) gap = 0;
      var layer = parseInt(document.querySelector('input[name="layer"]:checked').value);
      window.parent.__df_cmd = {
        type: 'start',
        gap: gap,
        layer: layer,
        options: {
          vias: optVias.checked,
          pads: optPads.checked,
          cutouts: optCutouts.checked,
          textCopper: optTextCopper.checked,
          textSilk: optTextSilk.checked,
          linesSilk: optLinesSilk.checked,
          linesCopper: optLinesCopper.checked,
          tracksCopper: optTracksCopper.checked
        }
      };
      drawing = true;
      btn.textContent = '完成绘制';
      btn.className = 'btn finish';
      gapInput.disabled = true;
      layerTop.disabled = true;
      layerBottom.disabled = true;
    }

    function finishDrawing() {
      window.parent.__df_cmd = { type: 'finish' };
    }

    function cancelDrawing() {
      window.parent.__df_cmd = { type: 'stop' };
    }

    btn.addEventListener('click', function() {
      if (!drawing) {
        startDrawing();
      } else {
        finishDrawing();
      }
    });

    function resetDrawingState() {
      drawing = false;
      btn.textContent = '开始绘制';
      btn.className = 'btn';
      gapInput.disabled = false;
      layerTop.disabled = false;
      layerBottom.disabled = false;
    }

    function resetUI() {
      resetDrawingState();
      optSelectAll.checked = false;
      optVias.checked = true;
      optPads.checked = true;
      optCutouts.checked = true;
      optTextCopper.checked = false;
      optTextSilk.checked = true;
      optLinesSilk.checked = true;
      optLinesCopper.checked = false;
      optTracksCopper.checked = false;
    }

    // Keyboard shortcuts: Enter = finish, Escape = cancel
    document.addEventListener('keydown', function(e) {
      if (!drawing) return;
      if (e.key === 'Enter') {
        e.preventDefault();
        finishDrawing();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        cancelDrawing();
      }
    });

    setInterval(function() {
      try {
        var s = window.parent.__df_status;
        if (s) {
          delete window.parent.__df_status;
          if (s.type === 'done') {
            resetDrawingState();
          } else if (s.type === 'reset') {
            resetUI();
          }
        }
      } catch(e) {}
    }, 200);

  </script>
</body>
</html>
